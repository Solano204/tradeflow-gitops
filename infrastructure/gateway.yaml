apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: tradeflow-gateway
  namespace: traefik
spec:
  gatewayClassName: traefik # Tells Kubernetes to use the Traefik engine
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: All # Allows your modules in 'production' namespace to connect