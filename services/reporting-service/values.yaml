replicaCount: 1

image:
  repository: 765288911542.dkr.ecr.us-east-1.amazonaws.com/reporting-service
  tag: "1.0.0"
  pullPolicy: Always

service:
  type: ClusterIP
  # Internal discovery port (keep it 80 for all services to make calling them easier)
  port: 80 
  targetPort: 8090 

serviceName: "REPORTING"

resources:
  # INCREASED: Spring Boot needs more room to breathe
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"