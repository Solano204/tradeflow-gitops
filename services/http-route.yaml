apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: main-api-route
  namespace: production
spec:
  parentRefs:
    - name: tradeflow-gateway
      namespace: traefik
  hostnames:
    - "api.tradeflow.local"
  rules:
    # ── Core services ──────────────────────────────────────────
    - matches:
        - path: { type: PathPrefix, value: /api/auth }
      backendRefs:
        - name: auth-service
          port: 80
    - matches:
        - path: { type: PathPrefix, value: /api/users }
      backendRefs:
        - name: user-service
          port: 80
    # ── Trade lifecycle ────────────────────────────────────────
    - matches:
        - path: { type: PathPrefix, value: /api/inventory }
      backendRefs:
        - name: inventory-service
          port: 80
    - matches:
        - path: { type: PathPrefix, value: /api/orders }
      backendRefs:
        - name: order-service
          port: 80
    - matches:
        - path: { type: PathPrefix, value: /api/payments }
      backendRefs:
        - name: payment-service
          port: 80
    # ── Supporting services ────────────────────────────────────
    - matches:
        - path: { type: PathPrefix, value: /api/notifications }
      backendRefs:
        - name: notification-service
          port: 80
    - matches:
        - path: { type: PathPrefix, value: /api/analytics }
      backendRefs:
        - name: analytics-service
          port: 80
    - matches:
        - path: { type: PathPrefix, value: /api/search }
      backendRefs:
        - name: search-service
          port: 80
    - matches:
        - path: { type: PathPrefix, value: /api/reports }
      backendRefs:
        - name: reporting-service
          port: 80
    # ── API Gateway (catch-all / health) ──────────────────────
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: api-gateway
          port: 80