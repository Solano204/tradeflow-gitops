apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: search-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Solano204/tradeflow-gitops.git
    targetRevision: main
    path: services/search-service
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true