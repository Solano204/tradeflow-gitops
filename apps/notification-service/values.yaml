replicaCount: 1

image:
  repository: 765288911542.dkr.ecr.us-east-1.amazonaws.com/notification-service
  tag: "1.0.0"
  pullPolicy: Always

imagePullSecrets:
  - name: ecr-pull-secret

service:
  type: ClusterIP
  port: 80
  targetPort: 8081

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"