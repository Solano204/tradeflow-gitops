# ─────────────────────────────────────────────────────────────────
# argocd/applications.yaml
# Apply once: kubectl apply -f argocd/applications.yaml
# ArgoCD will then watch Git and auto-deploy every service.
# CHANGE: replace YOUR_ORG with your GitHub username/org.
# ─────────────────────────────────────────────────────────────────

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api-gateway
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: default
  source:
    repoURL: https://github.com/Solano204/tradeflow-cd.git
    targetRevision: main
    path: apps/api-gateway
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]

